name: Sync F2FS from A15
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy-f2fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout A31 Repo (Target)
        uses: actions/checkout@v4
        with:
          path: a31_repo

      - name: Checkout A15 Repo (Source)
        uses: actions/checkout@v4
        with:
          repository: oppo-source/A15
          path: a15_repo

      - name: Sync F2FS and Missing Headers
        run: |
          # 1. Copy F2FS Driver
          mkdir -p a31_repo/kernel-4.9/fs/
          cp -rv a15_repo/kernel-4.9/fs/f2fs a31_repo/kernel-4.9/fs/

          # 2. Copy missing overflow.h (Fixes the fatal error)
          mkdir -p a31_repo/kernel-4.9/include/linux/
          if [ -f a15_repo/kernel-4.9/include/linux/overflow.h ]; then
            cp -v a15_repo/kernel-4.9/include/linux/overflow.h a31_repo/kernel-4.9/include/linux/
          fi

          # 3. Copy f2fs_fs.h (Essential for F2FS compilation)
          if [ -f a15_repo/kernel-4.9/include/linux/f2fs_fs.h ]; then
            cp -v a15_repo/kernel-4.9/include/linux/f2fs_fs.h a31_repo/kernel-4.9/include/linux/
          fi

          # 4. Copy UAPI headers (User API for tools like make_f2fs)
          mkdir -p a31_repo/kernel-4.9/include/uapi/linux/
          if [ -f a15_repo/kernel-4.9/include/uapi/linux/f2fs.h ]; then
            cp -v a15_repo/kernel-4.9/include/uapi/linux/f2fs.h a31_repo/kernel-4.9/include/uapi/linux/
          fi
          
      - name: Commit and Push changes
        run: |
          cd a31_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kernel-4.9/fs/f2fs
          git add kernel-4.9/include/linux/overflow.h || echo "No overflow.h to add"
          git add kernel-4.9/include/linux/f2fs_fs.h || echo "No f2fs_fs.h to add"
          git add kernel-4.9/include/uapi/linux/f2fs.h || echo "No uapi header to add"
          git commit -m "Sync F2FS and missing headers from Oppo A15" || exit 0
          git push
