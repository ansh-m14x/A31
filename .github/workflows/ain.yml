name: A31 Kernel Build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --privileged

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Install Build Packages
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y \
        python2 python-is-python2 git ccache automake flex lzop bison gperf \
        build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
        libbz2-dev libghc-bzlib-dev squashfs-tools pngcrush fontconfig \
        liblz4-tool make optipng maven libssl-dev pwgen bc libc6-dev-i386 \
        libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip \
        device-tree-compiler libncurses5 libtinfo5 wget

    - name: Download Toolchains
      run: |
        # Downloaded early to ensure environment is ready
        mkdir -p tools
        git clone https://github.com/KAGA-KOKO/clang-6.0.2 -b clang --depth=1 tools/clang
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b ndk-release-r16 --depth=1 tools/gcc64
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b ndk-release-r16 --depth=1 tools/gcc32

    - name: Connectivity Integration & Safe Patching
      run: |
        # Kaga connectivity integration
        rm -rf kernel-4.9/drivers/misc/mediatek/connectivity
        git clone https://github.com/KAGA-KOKO/kernel-oppo6765 -b base-oss --depth=1 temp_kaga
        mv temp_kaga/drivers/misc/mediatek/connectivity kernel-4.9/drivers/misc/mediatek/
        rm -rf temp_kaga

        # Safe Qualcomm Header Patching (Exclude connectivity folder)
        echo "Patching legacy Qualcomm header paths safely..."
        find kernel-4.9 -path kernel-4.9/drivers/misc/mediatek/connectivity -prune -o -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|<soc/qcom/|<linux/soc/qcom/|g' {} +

    - name: Watchdog & Multimedia Fixes
      run: |
        # Watchdog v1 to v2 Symbolic Link (Mismatch Fix) - Using your confirmed working logic
        cd kernel-4.9/drivers/watchdog/mediatek/wdt/common/
        if [ -d "wdt_v2" ] && [ ! -d "wdt_v1" ]; then
          ln -s wdt_v2 wdt_v1
          echo "Watchdog v1 linked to v2 successfully!"
        fi
        cd ../../../../../..
        
        # Multimedia source flag
        export NOT_PREBUILT=yes

    - name: Config Tweaks
      run: |
        DEFCONFIG="kernel-4.9/arch/arm64/configs/oppo6765_19581_defconfig"
        
        # SELinux and Performance Tweaks
        sed -i 's/CONFIG_SECURITY_SELINUX=y/CONFIG_SECURITY_SELINUX=n/g' $DEFCONFIG
        echo "CONFIG_SECURITY_SELINUX_BOOTPARAM=y" >> $DEFCONFIG
        echo "CONFIG_SECURITY_SELINUX_DEVELOP=y" >> $DEFCONFIG
        
        # HW Acceleration & Multimedia Defconfig
        echo "CONFIG_MTK_VIDEOCODEC_DRIVER=y" >> $DEFCONFIG
        echo "CONFIG_MTK_SMI_EXT=y" >> $DEFCONFIG
        echo "CONFIG_MTK_CMDQ=y" >> $DEFCONFIG
        echo "CONFIG_MTK_FLASHLIGHT_MT6370=y" >> $DEFCONFIG

        sed -i 's/CONFIG_CMDLINE="/CONFIG_CMDLINE="androidboot.selinux=permissive /g' $DEFCONFIG
        sed -i 's/CONFIG_TOUCHPANEL_NEW_SET_IRQ_WAKE/CONFIG_TOUCHPANEL_NEW_SET_IRQ_WAKE=y/g' $DEFCONFIG
        echo "CONFIG_PROCESS_RECLAIM=y" >> $DEFCONFIG
        echo "CONFIG_PGTABLE_MAPPING=y" >> $DEFCONFIG

    - name: Compile Kernel & Modules
      run: |
        export PATH=$(pwd)/tools/clang/bin:$(pwd)/tools/gcc64/bin:$(pwd)/tools/gcc32/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export NOT_PREBUILT=yes
        
        export KCFLAGS="-Wno-sometimes-uninitialized"
        
        cd kernel-4.9
        make O=out mrproper
        make O=out oppo6765_19581_defconfig
        
        make -j$(nproc) O=out \
             CC=clang \
             CLANG_TRIPLE=$CLANG_TRIPLE \
             CROSS_COMPILE=$CROSS_COMPILE \
             CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
             Image.gz-dtb
             
        make -j$(nproc) O=out \
             CC=clang \
             CLANG_TRIPLE=$CLANG_TRIPLE \
             CROSS_COMPILE=$CROSS_COMPILE \
             CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
             modules

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: A31-Kernel-RoaringLionus
        path: |
          kernel-4.9/out/arch/arm64/boot/Image.gz-dtb
          kernel-4.9/out/drivers/misc/mediatek/connectivity/**/*.ko
          vendor/oppo_media/av/ffmpeg_cm_14_1/*.so
          kernel-4.9/out/.config
